<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vulnerability Scanner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1>🔒 Vulnerability Scanner</h1>
            <p class="subtitle">Enter your Telegram ID to login</p>
            
            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}
            
            <form method="POST">
                <div class="form-group">
                    <label for="telegram_id">Telegram ID</label>
                    <input type="text" id="telegram_id" name="telegram_id" required 
                           placeholder="Your Telegram user ID">
                </div>
                
                <div class="form-group">
                    <label for="username">Username (optional)</label>
                    <input type="text" id="username" name="username" 
                           placeholder="Your display name">
                </div>
                
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            
            <div class="help-text">
                <p>Don't know your Telegram ID?</p>
                <ol>
                    <li>Message <strong>@userinfobot</strong> on Telegram</li>
                    <li>It will reply with your ID</li>
                </ol>
            </div>
        </div>
    </div>
</body>
</html>
